    <script>
        // 1. Logika Smooth Loading Screen
        window.addEventListener('load', () => {
            setTimeout(() => {
                const loader = document.getElementById('loader');
                loader.style.opacity = '0';
                loader.style.visibility = 'hidden';
            }, 1000); 
        });

        // 2. Logika Efek Splash Air saat Klik Area Kosong
        document.addEventListener('click', function(e) {
            // Jika klik mendeteksi tombol atau bagian dalam tombol, abaikan agar splash tidak numpuk
            if (e.target.closest('.btn')) return;

            const splash = document.createElement('div');
            splash.classList.add('splash');
            
            splash.style.left = e.pageX + 'px';
            splash.style.top = e.pageY + 'px';
            splash.style.width = '35px';
            splash.style.height = '35px';
            
            document.body.appendChild(splash);
            
            setTimeout(() => {
                splash.remove();
            }, 500);
        });
    </script>
